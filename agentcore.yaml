# Amazon Bedrock AgentCore deployment configuration
# Used by: agentcore configure / agentcore launch
#
# Required env vars (set via .env or AgentCore console):
#   AWS_REGION, BEDROCK_MODEL_ID
# Optional env vars (see .env.template for full list):
#   OTEL_EXPORTER_OTLP_ENDPOINT, DATABASE_URL, LOG_LEVEL

agent:
  name: sentinalai-observeai
  entrypoint: agentcore_runtime.py
  description: >
    SentinalAI (ObserveAI) - Deterministic incident investigation agent.
    Performs root cause analysis using rules-first orchestration with
    evidence-backed outputs and bounded execution.

runtime:
  port: 8080
  timeout_seconds: 120
  memory_mb: 2048
  health_check:
    path: /ping
    interval_seconds: 30
    timeout_seconds: 5
    unhealthy_threshold: 3

requirements:
  file: requirements-agentcore.txt

logging:
  level: ${LOG_LEVEL:-INFO}
  format: json

environment:
  # --- Core Runtime ---
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  SENTINALAI_REPLAY_DIR: /tmp/sentinalai_replays

  # --- AI / LLM (generic Bedrock — no org-specific endpoints) ---
  AWS_REGION: ${AWS_REGION:-us-east-1}
  BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-sonnet-4-20250514}

  # --- Database (optional — leave blank to skip DB features) ---
  DATABASE_URL: ${DATABASE_URL:-}
  DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
  DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
  DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
  DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}

  # --- OpenTelemetry (set endpoint to enable; leave blank to disable) ---
  OTEL_SERVICE_NAME: sentinalai
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_DEPLOYMENT_ENV: ${OTEL_DEPLOYMENT_ENV:-dev}

  # --- AgentCore Memory (set memory ID to enable STM + LTM) ---
  BEDROCK_AGENTCORE_MEMORY_ID: ${BEDROCK_AGENTCORE_MEMORY_ID:-}
  MEMORY_STM_LAST_K_TURNS: ${MEMORY_STM_LAST_K_TURNS:-5}
  MEMORY_LTM_TOP_K: ${MEMORY_LTM_TOP_K:-3}
  MEMORY_LTM_RELEVANCE_THRESHOLD: ${MEMORY_LTM_RELEVANCE_THRESHOLD:-0.5}

  # --- Investigation Defaults ---
  MAX_WORKER_CALLS: ${MAX_WORKER_CALLS:-20}
  INVESTIGATION_TIMEOUT: ${INVESTIGATION_TIMEOUT:-120}
  CIRCUIT_BREAKER_THRESHOLD: ${CIRCUIT_BREAKER_THRESHOLD:-3}
  CIRCUIT_BREAKER_RESET: ${CIRCUIT_BREAKER_RESET:-60}
