version: "3.9"

# AG UI stack: BFF + Frontend dev server
# Run alongside existing docker-compose.yaml

services:
  agui-bff:
    build:
      context: .
      dockerfile: agui/Dockerfile.agui
    ports:
      - "8081:8081"
    environment:
      # AG UI config — secure by default; override explicitly for local dev.
      AGUI_BFF_PORT: "8081"
      AGUI_AUTH_REQUIRED: "${AGUI_AUTH_REQUIRED:-true}"   # auth ON by default
      # No baked secret. Supply AGUI_JWT_SECRET from the environment; compose
      # fails fast if it is unset rather than shipping a known dev secret.
      AGUI_JWT_SECRET: "${AGUI_JWT_SECRET:?set AGUI_JWT_SECRET — no baked secret}"
      AGUI_CORS_ORIGINS: "${AGUI_CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}"
      AGUI_ENABLED: "true"
      AGUI_DEV_RELOAD: "false"
      # Explicit runtime data mode. 'stub' returns synthetic fixtures and must
      # never be used in production; set AGENTCORE_GATEWAY_URL for real data.
      GATEWAY_MODE: "${GATEWAY_MODE:-stub}"
      AGENTCORE_GATEWAY_URL: "${AGENTCORE_GATEWAY_URL:-}"

      # Storage (optional — falls back to in-memory/local)
      AGUI_DYNAMODB_TABLE: "agui-state"
      AGUI_S3_BUCKET: "agui-receipts"
      AGUI_LOCAL_RECEIPT_DIR: "/tmp/agui-receipts"

      # AWS (required for DynamoDB + S3 in production)
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"

      # Connect to existing agent
      AGENTCORE_AGENT_URL: "http://sentinalai:8080"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    volumes:
      - agui-receipts:/tmp/agui-receipts

    networks:
      - agui-net
      - sentinalai-net

  agui-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.ui
    ports:
      - "5173:5173"
    environment:
      VITE_BFF_URL: "http://localhost:8081"
      VITE_WS_URL: "ws://localhost:8081"
    depends_on:
      agui-bff:
        condition: service_healthy
    networks:
      - agui-net

volumes:
  agui-receipts:

networks:
  agui-net:
  sentinalai-net:
    external: true
