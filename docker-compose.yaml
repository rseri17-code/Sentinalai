# SentinalAI — single-image deployment
# Everything (agent + OTEL collector) runs in one container.
# The OTEL collector starts automatically when SPLUNK_HEC_* vars are set.
#
# Usage:
#   cp .env.template .env   # fill in values
#   docker compose up --build

services:
  sentinalai:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Replay dir (container-internal)
      - SENTINALAI_REPLAY_DIR=/tmp/sentinalai_replays
      # OTEL service name (fixed)
      - OTEL_SERVICE_NAME=sentinalai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    volumes:
      - replay-data:/tmp/sentinalai_replays
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

volumes:
  replay-data:
    driver: local
