# =============================================================================

# TOOL SELECTION HEURISTICS

# =============================================================================

# Use this section to intelligently select tools based on incident characteristics

selection_rules:
by_incident_type:
timeout:
required_tools:
- moogsoft.get_incident_by_id
- splunk.search_oneshot
- sysdig.golden_signals
optional_tools:
- signalfx.query_signalfx_metrics
reasoning: “Timeouts require log analysis for error patterns + latency metrics”

```
oomkill:
  required_tools:
    - splunk.search_oneshot
    - sysdig.query_metrics
    - sysdig.get_events
  optional_tools:
    - moogsoft.get_historical_analysis
  reasoning: "OOMKill needs memory trend analysis + event correlation"
  
error_spike:
  required_tools:
    - splunk.search_oneshot
    - splunk.app_change_data
    - sysdig.get_events
  optional_tools:
    - splunk.get_change_data
  reasoning: "Error spikes often correlate with deployments"
  
latency:
  required_tools:
    - sysdig.golden_signals
    - sysdig.query_metrics
    - splunk.search_oneshot
  optional_tools:
    - signalfx.query_signalfx_metrics
  reasoning: "Latency requires performance metrics + dependency analysis"
  
resource_saturation:
  required_tools:
    - sysdig.query_metrics
    - sysdig.golden_signals
    - splunk.get_host_metrics
  optional_tools:
    - sysdig.discover_metrics
  reasoning: "Resource issues need infrastructure metrics"
```

by_investigation_phase:
initial_context:
tools:
- moogsoft.get_incident_by_id
- moogsoft.get_critical_incidents
max_calls: 2

```
evidence_gathering:
  tools:
    - splunk.search_oneshot
    - sysdig.query_metrics
    - sysdig.golden_signals
  max_calls: 5
  
change_correlation:
  tools:
    - splunk.get_change_data
    - splunk.app_change_data
    - sysdig.get_events
  max_calls: 3
  
historical_context:
  tools:
    - moogsoft.get_historical_analysis
    - moogsoft.get_closed_incidents
  max_calls: 2
```

