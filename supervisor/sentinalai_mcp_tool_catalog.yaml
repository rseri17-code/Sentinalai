# =============================================================================

# INVESTIGATION PLAYBOOKS

# =============================================================================

# Pre-defined tool sequences for common incident types

playbooks:
timeout_investigation:
name: “Timeout/Connection Failure Investigation”
incident_types:
- timeout
- connection_failure
tools_sequence:
- step: 1
phase: initial_context
tool: moogsoft.get_incident_by_id
purpose: “Get incident details and affected service”
required: true

```
  - step: 2
    phase: evidence_gathering
    tool: splunk.search_oneshot
    purpose: "Search for timeout error patterns"
    query_template: "timeout OR connection_timeout | stats count by service"
    required: true
    
  - step: 3
    phase: evidence_gathering
    tool: sysdig.golden_signals
    purpose: "Check service latency metrics"
    target: "affected_service_from_step_1"
    required: true
    
  - step: 4
    phase: evidence_gathering
    tool: splunk.search_oneshot
    purpose: "Identify downstream dependency from timeout messages"
    query_template: "Parse timeout messages for downstream service"
    required: true
    
  - step: 5
    phase: evidence_gathering
    tool: sysdig.query_metrics
    purpose: "Check downstream service health"
    target: "downstream_service_from_step_4"
    metrics: ["response_time", "error_rate"]
    required: true
    
  - step: 6
    phase: change_correlation
    tool: splunk.get_change_data
    purpose: "Check for recent changes to downstream service"
    filter: "downstream_service, last 24h"
    required: false
    
timeline_analysis:
  compare_timestamps:
    - step_3_latency_start
    - step_2_timeout_start
  determine: "Did downstream latency precede upstream timeouts?"
  
expected_root_cause_patterns:
  - "Downstream service latency"
  - "Database slow queries"
  - "Network issues"
```

oomkill_investigation:
name: “OOMKill/Memory Exhaustion Investigation”
incident_types:
- oomkill
- memory_exhaustion
tools_sequence:
- step: 1
phase: evidence_gathering
tool: splunk.search_oneshot
purpose: “Confirm OOMKill events”
query_template: “OOMKilled”
required: true

```
  - step: 2
    phase: evidence_gathering
    tool: sysdig.query_metrics
    purpose: "Get memory usage trends"
    metric: "memory_usage_bytes"
    time_range: "last 24 hours"
    required: true
    
  - step: 3
    phase: evidence_gathering
    tool: sysdig.get_events
    purpose: "Get pod restart history"
    filter: "pod_restart, affected_service"
    required: true
    
  - step: 4
    phase: evidence_gathering
    tool: splunk.search_oneshot
    purpose: "Check application logs for memory issues"
    query_template: "heap OR memory OR gc"
    required: true
    
analysis_checklist:
  - "Is memory usage gradually increasing? (indicates memory leak)"
  - "Are there OOMKill patterns? (regular intervals = leak)"
  - "Recent deployment correlation?"
  
expected_root_cause_patterns:
  - "Memory leak in application code"
  - "Insufficient memory limits"
  - "Cache misconfiguration"
```

error_spike_investigation:
name: “Error Spike Investigation”
incident_types:
- error_spike
- exception_increase
tools_sequence:
- step: 1
phase: evidence_gathering
tool: splunk.search_oneshot
purpose: “Get error pattern and distribution”
query_template: “error | stats count by error_type”
required: true

```
  - step: 2
    phase: change_correlation
    tool: splunk.app_change_data
    purpose: "Check recent deployments"
    filter: "affected_service"
    required: true
    
  - step: 3
    phase: evidence_gathering
    tool: sysdig.get_events
    purpose: "Get deployment/change events"
    filter: "deployment, affected_service"
    required: true
    
  - step: 4
    phase: evidence_gathering
    tool: sysdig.golden_signals
    purpose: "Validate impact on service health"
    target: "affected_service"
    required: true
    
timeline_analysis:
  compare_timestamps:
    - step_2_deployment_time
    - step_1_error_spike_time
  determine: "Did deployment precede error spike?"
  
expected_root_cause_patterns:
  - "Bad deployment introduced bugs"
  - "Configuration change"
  - "Dependency version mismatch"
```

# =============================================================================

# TOKEN OPTIMIZATION STRATEGIES

# =============================================================================

token_optimization:
principles:
- “Load this catalog once at investigation start”
- “Use selection_rules to pick tools, not full schemas”
- “Only load full tool schema when calling the tool”
- “Cache tool responses, don’t re-call same tool”

tool_selection_workflow:
step_1: “Classify incident type from initial context”
step_2: “Look up incident type in selection_rules.by_incident_type”
step_3: “Get required_tools list (3-5 tools max)”
step_4: “Load full schemas only for selected tools”
step_5: “Execute tools, cache results”
step_6: “If more context needed, consult selection_rules again”

token_costs:
loading_full_catalog: 0  # This file replaces full catalog
loading_single_tool_schema: 50-200  # Only load when calling
tool_response: 200-2000  # Depends on tool

example_token_savings:
old_approach:
- “Load all 89 tool schemas: ~8000 tokens”
- “Parse through all to find relevant: wasted effort”
- “Total: 8000+ tokens before investigation starts”

```
new_approach:
  - "Load this catalog: 0 tokens (pre-loaded knowledge)"
  - "Select 3-5 relevant tools using rules: instant"
  - "Load only 3-5 tool schemas: ~500 tokens"
  - "Total: 500 tokens (94% reduction)"
```

# =============================================================================

# RATE LIMITS & PERFORMANCE

# =============================================================================

rate_limits:
moogsoft:
requests_per_minute: 60
concurrent_requests: 5
recommendation: “Cache incident details, poll every 60s”

splunk:
requests_per_minute: unlimited
concurrent_searches: 10
recommendation: “Use saved searches for recurring queries”
max_search_time: “30 seconds per search”

sysdig:
requests_per_minute: 100
concurrent_requests: 10
recommendation: “Query specific metrics, avoid wildcards”

signalfx:
requests_per_hour: 1000
recommendation: “Batch metric queries”

performance_expectations:
fast_tools:
- moogsoft.get_incident_by_id  # < 2s
- moogsoft.get_critical_incidents  # < 2s
- sysdig.golden_signals  # < 3s
- splunk.get_change_data  # < 3s

medium_tools:
- sysdig.query_metrics  # < 5s
- sysdig.get_events  # < 3s
- splunk.search_oneshot  # 5-30s (variable)

slow_tools:
- splunk.search_export  # streaming, variable
- splunk.run_saved_search  # 5-30s

# =============================================================================

# BEST PRACTICES

# =============================================================================

best_practices:
tool_calling:
- “Always start with moogsoft.get_incident_by_id for context”
- “Call sysdig.golden_signals early for quick health overview”
- “Use splunk.search_oneshot with time bounds”
- “Avoid calling discovery tools during investigation”
- “Cache tool responses, never call same tool twice”

investigation_flow:
- “Phase 1: Initial context (1-2 tool calls, < 5 seconds)”
- “Phase 2: Evidence gathering (3-5 tool calls, < 30 seconds)”
- “Phase 3: Change correlation (1-2 tool calls, < 10 seconds)”
- “Phase 4: Historical context (optional, 1-2 tool calls)”
- “Total: 5-10 tool calls, < 60 seconds”

query_optimization:
splunk:
- “Always add earliest= and latest= time bounds”
- “Use index= filter first in query”
- “Add | head 1000 for large result sets”
- “Avoid wildcards at start of search terms”

```
sysdig:
  - "Request specific metric names, not wildcards"
  - "Limit time ranges to investigation window"
  - "Use golden_signals for overview before detailed queries"
```

